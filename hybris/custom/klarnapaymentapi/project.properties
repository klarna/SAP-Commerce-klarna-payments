# klarnapaymentapi.key=value

# Specifies the location of the spring context file putted automatically to the global platform application context.
klarnapaymentapi.application-context=klarnapaymentapi-spring.xml

# you can control your logger as follows:
log4j2.logger.klarna.name=com.klarna.api
log4j2.logger.klarna.level = debug
log4j2.logger.klarna.appenderRef.stdout.ref = STDOUT

klarna.api.logging.enabled=true

# API URLs
klarna.api.v2.global.production=https://api-global.klarna.com/v2
klarna.api.v2.global.playground=https://api-global.test.klarna.com/v2
klarna.api.v2.create_payment_request=/payment/requests
klarna.api.v2.create_webhook=/notification/webhooks
klarna.api.v2.update_webhook=/notification/webhooks/{webhook_id}
klarna.api.v2.delete_webhook=/notification/webhooks/{webhook_id}
klarna.api.v2.simulate_webhook=/notification/webhooks/{webhook_id}/simulate
klarna.api.v2.create_signing_key=/notification/signing-keys
klarna.api.v2.delete_signing_key=/notification/signing-keys/{signing_key_id}